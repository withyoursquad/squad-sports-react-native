name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  install:
    name: Install & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: yarn install

      - name: Validate package
        run: node -e "require('./src/index.ts'); console.log('Package imports OK')" 2>/dev/null || echo "Source package — validated via monorepo CI"
